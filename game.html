<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正規表現インベーダーゲーム - プレイ中</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container game-container">
        <h1>正規表現インベーダー</h1>
        <div class="game-header">
            <div class="level-info">LEVEL: <span id="level-display"></span></div>
            <div class="question-counter" id="question-counter">STAGE: 1/5</div>
            <div class="lives">LIVES: <span id="lives">3</span></div>
        </div>

        <div class="game-area">
            <div class="invader-container">
                <div class="invader" id="invader"></div>
            </div>

            <div class="problem-container">
                <h2 id="problem-description"></h2>
                <div class="examples">
                    <div class="example-group">
                        <h3>MATCH:</h3>
                        <ul id="match-examples"></ul>
                    </div>
                    <div class="example-group">
                        <h3>DON'T MATCH:</h3>
                        <ul id="non-match-examples"></ul>
                    </div>
                </div>
                <div id="hint" class="hint" style="display: none;"></div>
                <div id="answer" class="answer" style="display: none;"></div>
            </div>

            <div class="input-container">
                <div class="regex-input">
                    <span class="regex-delimiter">/</span>
                    <input type="text" id="regex-pattern" placeholder="正規表現を入力">
                    <span class="regex-delimiter">/</span>
                </div>
                <button id="submit-btn" class="btn">FIRE!</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <div class="game-controls">
            <a href="index.html" class="btn">QUIT</a>
            <button id="next-btn" class="btn" style="display: none;">NEXT</button>
        </div>
    </div>

    <div id="game-over" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>GAME RESULT</h2>
            <p>GAME CLEAR!</p>
            <div id="final-answer" class="final-answer"></div>
            <div id="result-stats" class="result-stats"></div>
            <a href="" id="retry-link" class="btn">RETRY</a>
            <a href="index.html" class="btn">TITLE</a>
        </div>
    </div>

    <script src="static/js/problems.js"></script>
    <script src="static/js/game.js"></script>
    <script>
        // RETRY リンクは現在の level を引き継ぐ
        (function () {
            const level = new URLSearchParams(window.location.search).get('level') || 'beginner';
            const retryLink = document.getElementById('retry-link');
            if (retryLink) retryLink.href = `game.html?level=${encodeURIComponent(level)}`;
        })();
    </script>
</body>
</html>
